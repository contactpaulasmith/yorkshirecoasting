kind = "web"
previewPath = "/"
title = "Holiday Let Website"
version = "1.0.0"
id = "artifacts/holiday-let"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23243

[services.development]
run = "pnpm --filter @workspace/holiday-let run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/holiday-let", "run", "build" ]
publicDir = "artifacts/holiday-let/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23243"
BASE_PATH = "/"
